name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pyinstaller openpyxl

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "БазаДосок" main.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: БазаДосок
        path: dist/БазаДосок.exe
